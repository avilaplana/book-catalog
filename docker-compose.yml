services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: colophon
      POSTGRES_PASSWORD: colophon
      POSTGRES_DB: colophon
    ports:
      - "5433:5432"
    volumes:
      - colophon-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colophon -d colophon"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  colophon-pg:
